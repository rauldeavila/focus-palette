name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build extension
        run: ./build.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/focus-palette.aseprite-extension
